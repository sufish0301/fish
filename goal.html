<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>開胃菜餐酒館</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <style>
      :root {
        --brand-brown: #a7652f;
        --brand-orange: #d98443;
        --ink: #1f1714;
        --footer: #5f5653;
      }

      body {
        margin: 0;
        background: #f6f2ee;
        color: var(--ink);
        font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      }

      .site-shell {
        max-width: 960px;
        min-height: 100vh;
        margin: 0 auto;
        background: #fff;
        box-shadow: 0 18px 50px rgba(44, 27, 18, .12);
      }

      .top-menu {
        background: #050505;
        border-top: 5px solid #0096e8;
        border-left: 5px solid #0096e8;
        border-right: 5px solid #0096e8;
      }

      .top-menu .nav-link {
        color: #fff;
        padding: .32rem 1rem;
        font-size: .95rem;
        letter-spacing: .08em;
      }

      .top-menu .nav-link:hover,
      .top-menu .nav-link:focus {
        color: #ffc48b;
      }

      .social-link {
        color: #89a6c7;
        font-size: .85rem;
        text-decoration: none;
      }

      .hero-carousel img {
        height: 430px;
        object-fit: cover;
      }

      .carousel-caption {
        right: auto;
        bottom: auto;
        left: 2rem;
        top: 1.5rem;
        width: min(330px, calc(100% - 4rem));
        text-align: left;
      }

      .carousel-caption h1 {
        margin: 0;
        font-size: clamp(1.8rem, 5vw, 3.2rem);
        font-weight: 800;
        letter-spacing: .08em;
        text-shadow: 0 2px 18px rgba(0, 0, 0, .65);
      }

      .carousel-caption p {
        margin-top: .75rem;
        font-size: 1rem;
        text-shadow: 0 2px 12px rgba(0, 0, 0, .8);
      }

      .drink-warning {
        background: var(--brand-orange);
        color: #fff;
        font-size: clamp(1.25rem, 4vw, 2.3rem);
        line-height: 1.3;
        letter-spacing: .22em;
        text-align: center;
        padding: 1rem .75rem;
      }

      .section-title {
        color: #fff;
        background: var(--brand-brown);
        padding: .85rem 1.25rem;
      }

      .section-title h2 {
        margin: 0;
        font-size: clamp(1.4rem, 3vw, 2rem);
        font-weight: 700;
        letter-spacing: .12em;
      }

      .section-title p {
        margin: .2rem 0 0;
        letter-spacing: .06em;
      }

      .meal-section {
        background: linear-gradient(180deg, #fff 0%, #f7eee6 100%);
        padding: 1.5rem;
      }

      .meal-card {
        border: 0;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 12px 28px rgba(72, 46, 32, .12);
        height: 100%;
      }

      .meal-card img {
        height: 210px;
        object-fit: cover;
      }

      .meal-card .card-title {
        font-weight: 700;
      }

      .meal-card .price {
        color: var(--brand-brown);
        font-weight: 800;
      }

      .footer {
        background: var(--footer);
        color: #211917;
        text-align: center;
        padding: 2rem 1rem 1.4rem;
      }

      .footer-logo {
        width: 92px;
        height: 92px;
        margin: 0 auto .8rem;
        display: block;
        object-fit: contain;
      }

      .footer a {
        color: #211917;
        text-decoration: none;
      }

      .footer a:hover {
        text-decoration: underline;
      }

      a.btnstyle {
        color: white;
        background-color: #007bff;
        font-size: 24px;
        padding: 15px 20px;
        border: 1px solid #007bff;
        border-radius: 20px;
        cursor: pointer;
        text-decoration: none;
        line-height: 3em;
        display: inline-block;
        margin: 10px 5px;
      }

      a.btnstyle:hover {
        background-color: #00438a;
      }

      .safety-banner {
        background: var(--brand-brown);
        color: #fff;
        font-size: clamp(1.25rem, 4vw, 2.1rem);
        letter-spacing: .28em;
        text-align: center;
        padding: 1rem .75rem;
      }

      @media (max-width: 576px) {
        .site-shell {
          box-shadow: none;
        }

        .hero-carousel img {
          height: 330px;
        }

        .carousel-caption {
          left: 1rem;
          width: calc(100% - 2rem);
        }

        .meal-section {
          padding: 1rem;
        }

        .drink-warning,
        .safety-banner {
          letter-spacing: .12em;
        }
      }
    </style>
  </head>
  <!-- Google tag (gtag.js) -->

  <body>
    <div class="site-shell">
      <header>
        <div style="display:flex; justify-content:center; align-items:center; min-height:220px; padding:2rem 1rem;">
          <h1 style="margin:0; font-size:48px; font-weight:700; text-align:center; color:#1f1714;">感謝您的購買</h1>
        </div>
        <div class="px-2 py-1">
          <a class="social-link" href="https://www.facebook.com/" target="_blank" rel="noopener">Facebook</a>
        </div>
      </header>

      

      <footer class="footer">
        
        <img class="footer-logo" src="images/logo.jpg" alt="義式餐飲股份有限公司 Logo">
        <p class="mb-3"><a href="https://www.youtube.com/watch?v=dRSZhZT6r-Y&list=RDdRSZhZT6r-Y&start_radio=1" target="_blank" rel="noopener">義式餐飲股份有限公司</a></p>
        <div class="row justify-content-center gy-2 mb-3">
          <div class="col-sm-auto">連絡電話: <a href="tel:02-XXXX-XXXX">02-XXXX-XXXX</a></div>
          <div class="col-sm-auto">地址: 義式市番茄區酒館路</div>
          <div class="col-sm-auto">
            
          </div>
        </div>
        <p class="small mb-0">
          <a href="#">隱私權政策</a>
          <span class="mx-2">|</span>
          <a href="#">聯絡我們</a>
        </p>
      </footer>

      <div class="safety-banner">開車不喝酒 安全有保障</div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>

          setTimeout(function () {

      });
    </script>
  </body>
</html>
